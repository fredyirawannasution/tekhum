<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistem Upload Surat KPU</title>
  <script src="./config.js"></script>
  <style>
    :root{--card:#151518;--card2:#1f1f24;--line:#34343a;--text:#f8fafc;--muted:#cbd5e1;--brand:#dc2626;--brand2:#7f1d1d;--gold:#f59e0b;--shadow:0 24px 70px rgba(0,0,0,.48)}
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:radial-gradient(circle at 12% 8%,rgba(220,38,38,.20),transparent 30%),radial-gradient(circle at 88% 90%,rgba(245,158,11,.12),transparent 28%),linear-gradient(135deg,#050505,#111114 52%,#1b0b0b)}
    .shell{min-height:100%;display:grid;grid-template-rows:auto 1fr}
    header{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 18px;background:rgba(10,10,12,.86);border-bottom:1px solid rgba(255,255,255,.10);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .logo{width:44px;height:44px;object-fit:contain;background:#fff;border-radius:14px;padding:6px;flex:0 0 auto}
    .title{min-width:0}
    .title strong{display:block;font-size:16px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .title span{display:block;color:#fecaca;font-size:12px;margin-top:3px}
    .actions{display:none}
    .frame-wrap{padding:14px;min-height:0}
    .frame-card{height:calc(100vh - 86px);border-radius:22px;overflow:hidden;background:var(--card);border:1px solid rgba(255,255,255,.12);box-shadow:var(--shadow)}
    iframe{width:100%;height:100%;border:0;display:block;background:#111}
    .setup{min-height:calc(100vh - 86px);display:grid;place-items:center;padding:18px}
    .setup-card{width:min(720px,100%);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025)),var(--card);border:1px solid rgba(255,255,255,.12);border-radius:26px;box-shadow:var(--shadow);padding:24px}
    .ribbon{height:5px;border-radius:999px;background:linear-gradient(90deg,#030305,var(--brand),var(--gold));margin:14px 0 18px}
    h1{margin:0;font-size:24px}
    p{color:var(--muted);line-height:1.6}
    code{color:#fde68a}
    @media(max-width:700px){header{align-items:flex-start;flex-direction:column}.frame-wrap{padding:8px}.frame-card{height:calc(100vh - 86px);border-radius:16px}}
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/4/46/KPU_Logo.svg" alt="Logo KPU">
        <div class="title">
          <strong id="appTitle">Sistem Upload Surat KPU</strong>
          <span id="orgName">KPU Kabupaten Labuhanbatu Utara</span>
        </div>
      </div>
      <div class="actions"></div>
    </header>

    <main id="main"></main>
  </div>

  <script>
    const DEFAULT_URL = (window.TEKHUM_CONFIG && window.TEKHUM_CONFIG.APP_SCRIPT_URL) || '';

    document.getElementById('appTitle').textContent =
      (window.TEKHUM_CONFIG && window.TEKHUM_CONFIG.APP_TITLE) || 'Sistem Upload Surat KPU';

    document.getElementById('orgName').textContent =
      (window.TEKHUM_CONFIG && window.TEKHUM_CONFIG.ORG_NAME) || 'KPU Kabupaten Labuhanbatu Utara';

    function getAppUrl() {
      return DEFAULT_URL;
    }

    function isConfigured(url) {
      return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec(\?.*)?$/.test(String(url || '').trim());
    }

    function escapeAttr(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function render() {
      const url = getAppUrl();
      const main = document.getElementById('main');

      if (isConfigured(url)) {
        main.innerHTML =
          '<div class="frame-wrap">' +
            '<div class="frame-card">' +
              '<iframe id="appFrame" src="' + escapeAttr(url) + '" allow="clipboard-read; clipboard-write; fullscreen"></iframe>' +
            '</div>' +
          '</div>';
      } else {
        main.innerHTML =
          '<div class="setup">' +
            '<div class="setup-card">' +
              '<h1>URL Apps Script belum diatur</h1>' +
              '<div class="ribbon"></div>' +
              '<p>Edit file <code>config.js</code>, lalu isi <code>APP_SCRIPT_URL</code> dengan link Web App Apps Script yang berakhiran <code>/exec</code>.</p>' +
            '</div>' +
          '</div>';
      }
    }

    render();
  </script>
</body>
</html>
